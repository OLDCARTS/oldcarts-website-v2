<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Symptom Not Found · OLDCARTS Consulting</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/assets/css/main.css" />
  <style>
    .nf { min-height: 100svh; display: grid; place-items: center; text-align: center; padding: var(--gutter); }
    .nf__code { font-family: var(--font-mono); font-size: .68rem; letter-spacing: .2em; color: var(--pulse); margin-bottom: 1.4rem; display: block; }
    .nf h1 {
      font-family: var(--font-display); font-weight: 310;
      font-size: clamp(2.4rem, 7vw, 5.5rem); line-height: 1.02; letter-spacing: -0.03em;
      font-variation-settings: 'opsz' 144; margin-bottom: 1.2rem;
    }
    .nf h1 em { color: var(--sage); }
    .nf p { color: var(--bone-dim); margin-bottom: 2.2rem; }
    .nf svg { width: min(320px, 70vw); margin-bottom: 2.4rem; color: var(--pulse); }
  </style>
</head>
<body>
  <main class="nf">
    <div>
      <svg viewBox="0 0 320 60" fill="none" aria-hidden="true">
        <path d="M0 30 H110 L118 30 L124 12 L130 48 L136 22 L140 30 H190 L240 30 H320" stroke="currentColor" stroke-width="1.5" opacity=".85"/>
      </svg>
      <span class="nf__code">ERROR 404 — CHART MISSING</span>
      <h1>Symptom <em>not found.</em></h1>
      <p>This page isn't in the patient file. Let's take it from the top.</p>
      <a class="btn btn--solid" href="/">Return to the examination room</a>
    </div>
  </main>
</body>
</html>
