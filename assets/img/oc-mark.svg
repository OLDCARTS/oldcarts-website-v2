  <!-- hammer head: tilted, weighted toward the right point -->
  <path fill="currentColor" d="M70 146
    C60 128 72 106 98 100
    C124 94 148 100 154 116
    C160 132 150 152 128 162
    C106 172 80 166 70 146 Z"/>
